<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harborline</title>
    <style>
      html,
      body,
      #game-root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1220;
        position: relative;
      }
      #game-root canvas {
        display: block;
        margin: 0 auto;
        image-rendering: pixelated;
        position: absolute;
        inset: 0;
        background: transparent;
      }
      /* Phaser HUD canvas above Three.js city (inserted at z-index 0). */
      #game-root canvas:not(:first-child) {
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
